<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberShield Phishing Detector</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Welcome Screen -->
    <div id="welcome-screen">
        <h1>🛡️ Welcome to CyberShield</h1>
        <p>Protect yourself from phishing attacks.</p>
        <p class="loading">Loading...</p>
    </div>

    <!-- Main Website -->
    <div id="main-content" style="display:none;">

        <div class="container">
            <h1>CyberShield Phishing Detector</h1>

            <p>Paste a suspicious message or email below:</p>

            <textarea id="userInput" rows="8" placeholder="Paste message here..."></textarea>

            <br><br>

            <button onclick="analyzeMessage()">Analyze Message</button>

            <button onclick="clearResults()">Clear Results</button>

            <button onclick="window.location.href='warning-signs.html'">
                Learn About Phishing Signs
            </button>

            <h2>Results</h2>

            <p><strong>Risk Level:</strong> <span id="riskLevel"></span></p>

            <p><strong>Warning Signs:</strong></p>
            <ul id="warningSigns"></ul>

            <p><strong>Recommendation:</strong></p>
            <p id="recommendation"></p>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
